pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{js,ts,jsx,tsx,mjs,cjs}'
      run: pnpm exec eslint {staged_files} --fix
      stage_fixed: true
    format:
      glob: '*.{js,ts,jsx,tsx,mjs,cjs,json,md,css}'
      run: pnpm exec prettier {staged_files} --write
      stage_fixed: true
